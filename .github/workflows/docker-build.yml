name: Build and Test DAQ System

on:
  push:
    branches: [ deploy ]
  pull_request:
    branches: [ main, deploy ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        cd installer
        cp .env.example .env

    - name: Validate docker-compose files
      run: |
        cd installer
        docker compose config
        docker compose -f docker-compose.yml config

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate-compose
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [slackbot, lap-detector, startup-data-loader, file-uploader, data-downloader]
        include:
          - service: data-downloader
            dockerfile: backend/Dockerfile
            context_suffix: /data-downloader

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Convert repository name to lowercase
      run: |
        echo "IMAGE_NAME_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      run: |
        echo "tags<<EOF" >> $GITHUB_OUTPUT
        echo "${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}/${{ matrix.service }}:latest" >> $GITHUB_OUTPUT
        echo "${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Set build context
      id: context
      run: |
        if [ "${{ matrix.service }}" = "data-downloader" ]; then
          echo "context=./installer/data-downloader" >> $GITHUB_OUTPUT
          echo "dockerfile=backend/Dockerfile" >> $GITHUB_OUTPUT
        else
          echo "context=./installer/${{ matrix.service }}" >> $GITHUB_OUTPUT
          echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
        fi

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ steps.context.outputs.context }}
        file: ${{ steps.context.outputs.context }}/${{ steps.context.outputs.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: |
          org.opencontainers.image.title=${{ github.event.repository.name }}
          org.opencontainers.image.description=WFR DAQ System - ${{ matrix.service }}
          org.opencontainers.image.url=${{ github.event.repository.html_url }}
          org.opencontainers.image.source=${{ github.event.repository.html_url }}
          org.opencontainers.image.version=${{ github.sha }}
          org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}
    
    - name: Build and push frontend (for data-downloader only)
      if: matrix.service == 'data-downloader'
      uses: docker/build-push-action@v5
      with:
        context: ./installer/data-downloader
        file: ./installer/data-downloader/frontend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/data-downloader-frontend:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}/data-downloader-frontend:${{ github.sha }}
        build-args: |
          VITE_API_BASE_URL=http://localhost:8000
        labels: |
          org.opencontainers.image.title=${{ github.event.repository.name }}
          org.opencontainers.image.description=WFR DAQ System - data-downloader-frontend
          org.opencontainers.image.url=${{ github.event.repository.html_url }}
          org.opencontainers.image.source=${{ github.event.repository.html_url }}
          org.opencontainers.image.version=${{ github.sha }}
          org.opencontainers.image.created=${{ steps.meta.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}

  test-compose:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create .env file for testing
      run: |
        cd installer
        cp .env.example .env

    - name: Pull pre-built images
      run: |
        docker pull influxdb:3.5.0-core
        docker pull influxdata/influxdb3-ui:1.3.0
        docker pull grafana/grafana
        docker pull telegraf:1.30
        docker pull nginx:alpine

    - name: Build test images
      run: |
        cd installer
        docker compose build --parallel

    - name: Validate compose configuration
      run: |
        cd installer
        docker compose config --quiet

    - name: Test container startup (quick smoke test)
      run: |
        cd installer
        # Start core monitoring stack to ensure compose wiring is valid
        timeout 60s docker compose up influxdb3 influxdb3-explorer grafana frontend || true
        # Check if containers started (even if they exit quickly)
        docker compose ps

  cleanup:
    runs-on: ubuntu-latest
    needs: [validate-compose, build-and-push, test-compose]
    if: always()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Clean up Docker resources
      run: |
        docker system prune -f
        docker image prune -f
